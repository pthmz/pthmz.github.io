site_name: pthmz.github.io
site_url: https://pthmz.github.io
site_author: pthmz
site_description: pthmz 的博客

repo_name: pthmz/pthmz.github.io
repo_url: https://github.com/pthmz/pthmz.github.io

nav:
  - 首页: index.md
  - 在 Ubuntu 衍生版上安装 Google 拼音: blog/google-pinyin-installation-ubuntu-derivatives.md
  - 嵌入式 Python pip 安装: blog/embed-python-pip-installation-windows.md

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - header.autohide
  custom_dir: overrides

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark

plugins:
  - search
  - rss:
      match_path: blog/.*
      date_from_meta: 
        as_creation: date
        as_update: date
